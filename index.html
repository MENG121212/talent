<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>天赋原型测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", -apple-system, sans-serif;
  background: #f3e5ff;
  color: #444;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

.container { max-width: 500px; margin: 0 auto; padding: 0 16px 20px; }

/* ===== Header ===== */
.header {
  text-align: center; padding: 36px 0 8px;
}
.header h1 { font-size: 22px; font-weight: 700; color: #D8479B; letter-spacing: 1px; }

/* ===== Card ===== */
.card {
  background: #fff; border-radius: 20px; padding: 24px 20px;
  margin-bottom: 16px; box-shadow: 0 4px 20px rgba(180,140,200,0.12);
}
.card h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #333; }

/* ===== Intro ===== */
.intro-features { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; }
.intro-feature {
  flex: 1; min-width: 80px; text-align: center;
  background: #fdf6ff; border-radius: 14px; padding: 14px 8px;
}
.intro-feature .feat-icon { font-size: 24px; margin-bottom: 4px; }
.intro-feature .feat-title { font-size: 11px; font-weight: 600; color: #D8479B; margin-bottom: 2px; }
.intro-feature .feat-desc { font-size: 10px; color: #aaa; }

.guide-table { width: 100%; font-size: 11px; border-collapse: collapse; margin-bottom: 12px; }
.guide-table td { padding: 6px 8px; border-bottom: 1px solid #f8e8ff; }
.guide-table .g-num { font-weight: 700; width: 32px; text-align: center; font-size: 13px; }
.guide-table tr:nth-child(1) .g-num { color: #D8479B; }
.guide-table tr:nth-child(2) .g-num { color: #c23d8a; }
.guide-table tr:nth-child(3) .g-num { color: #a83478; }
.guide-table tr:nth-child(4) .g-num { color: #8c2a65; }
.guide-table tr:nth-child(5) .g-num { color: #712052; }

/* ===== Buttons ===== */
.btn {
  display: inline-block; padding: 12px 36px; border: none; border-radius: 14px;
  font-size: 15px; font-weight: 600; cursor: pointer; outline: none;
  transition: all 0.25s; letter-spacing: 0.5px;
  -webkit-tap-highlight-color: transparent;
}
.btn-start {
  background: #D8479B; color: #fff; box-shadow: 0 4px 16px rgba(216,71,155,0.3);
  font-size: 16px; padding: 14px 48px; width: 100%; max-width: 280px;
}
.btn-start:hover { background: #c23d8a; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(216,71,155,0.35); }
.btn-start:active { transform: translateY(0); background: #a83478; }

.btn-outline {
  background: #fff; color: #888; border: 1.5px solid #e8d8f0; font-size: 13px; padding: 10px 28px; border-radius: 12px;
}
.btn-outline:hover { border-color: #D8479B; color: #D8479B; }
.btn-outline:disabled { background: #fafafa; color: #d0b8e0; border-color: #f0e0f8; cursor: not-allowed; }

/* ===== Progress ===== */
.progress-wrap { margin-bottom: 16px; }
.progress-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.progress-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #e8d0f0;
  transition: all 0.3s;
}
.progress-dot.done { background: #c97fbf; }
.progress-dot.current { background: #D8479B; transform: scale(1.5); }
.progress-counter { text-align: center; font-size: 11px; color: #b8a0c0; font-weight: 500; }

/* ===== Quiz ===== */
.quiz-card { padding: 28px 22px 24px; }
.q-number {
  display: inline-block; background: #D8479B; color: #fff; font-size: 12px; font-weight: 700;
  padding: 4px 14px; border-radius: 20px; margin-bottom: 14px;
}
.q-text { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 24px; line-height: 1.6; }

.option-list { display: flex; flex-direction: column; gap: 10px; }
.opt-item {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 16px; border: 1.5px solid #e8d8f0; border-radius: 12px;
  background: #fff; cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.opt-item:hover { border-color: #d4b8e8; background: #fdf6ff; }
.opt-item.selected { border-color: #D8479B; background: #fef5fa; box-shadow: 0 0 0 1px #D8479B; }
.opt-radio {
  width: 20px; height: 20px; border-radius: 50%; border: 2px solid #d8c8e0;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s;
}
.opt-item.selected .opt-radio { border-color: #D8479B; }
.opt-item.selected .opt-radio::after {
  content: ''; width: 10px; height: 10px; border-radius: 50%; background: #D8479B;
}
.opt-label { font-size: 13px; font-weight: 500; color: #666; }
.opt-item.selected .opt-label { color: #D8479B; }

.quiz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; }

/* ===== Result: Header ===== */
.result-header { text-align: center; padding: 16px 0 4px; }
.result-header .en-title { font-size: 20px; font-weight: 700; color: #D8479B; letter-spacing: 2px; margin-bottom: 2px; }
.result-header .cn-title { font-size: 13px; color: #b090c0; }

/* ===== Result: Radar Section ===== */
.radar-section { text-align: center; }
.radar-section .radar-wrap { display: flex; justify-content: center; padding: 8px 0; }
.radar-section canvas { max-width: 100%; height: auto; }
.radar-legend { display: flex; justify-content: center; gap: 24px; font-size: 11px; color: #999; margin-top: 4px; }
.radar-legend span { display: flex; align-items: center; gap: 6px; }
.radar-legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.radar-legend .dot.top { background: #ffc107; }
.radar-legend .dot.normal { background: #fff; border: 1.5px solid #ccc; }

/* ===== Result: Archetype Card ===== */
.arch-card { text-align: center; padding: 20px 16px; }
.arch-icon { font-size: 48px; margin-bottom: 10px; display: block; }
.arch-title { 
  font-size: 28px; font-weight: 800; margin-bottom: 2px;
  background: linear-gradient(135deg, #D8479B, #9B59B6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.arch-tag {
  display: inline-block; background: #fff0f5; color: #D8479B;
  padding: 4px 16px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-bottom: 8px;
}
.arch-subtitle { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 12px; }
.arch-desc { font-size: 13px; color: #777; line-height: 1.8; text-align: left; padding: 0 8px; }
.arch-desc .quote { color: #e8c8f0; font-size: 20px; }

/* ===== Result: Bar Chart ===== */
.bar-section {}
.bar-section .bar-title { text-align: center; margin-bottom: 16px; }
.bar-section .bar-title h2 { font-size: 16px; color: #D8479B; font-weight: 700; letter-spacing: 1px; }
.bar-section .bar-title .sub { font-size: 11px; color: #b8a0c0; }

.bar-item { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.bar-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
.bar-info { flex: 1; min-width: 0; }
.bar-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.bar-name { font-size: 13px; font-weight: 600; color: #444; }
.bar-score { font-size: 12px; color: #999; }
.bar-rank {
  font-size: 10px; font-weight: 700; padding: 1px 8px; border-radius: 10px;
  background: #D8479B; color: #fff; margin-left: 6px;
}
.bar-bar { width: 100%; height: 8px; background: #f0e0f8; border-radius: 6px; overflow: hidden; }
.bar-fill {
  height: 100%; border-radius: 6px;
  background: linear-gradient(90deg, #D8479B, #AECBEB);
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ===== Footer ===== */
.footer { text-align: center; padding: 20px 16px 24px; }
.footer .restart { 
  display: inline-block; background: #D8479B; color: #fff; padding: 12px 40px;
  border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer;
  box-shadow: 0 4px 16px rgba(216,71,155,0.3); transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
}
.footer .restart:hover { background: #c23d8a; transform: translateY(-1px); }
.footer .restart:active { background: #a83478; transform: translateY(0); }
.footer .disclaimer { font-size: 11px; color: #c0a8d0; margin-top: 14px; }

/* ===== Animation ===== */
.fade-in { animation: fadeIn 0.45s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ===== Dark Mode ===== */
@media (prefers-color-scheme: dark) {
  body { background: #1a1025; color: #ccc; }
  .card { background: #241830; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .card h2 { color: #e0c0e8; }
  .header h1 { color: #e070b0; }
  .q-text { color: #e0c8e8; }
  .q-number { background: #c04a90; }
  .opt-item { background: #241830; border-color: #3a2848; }
  .opt-item:hover { border-color: #5a3a68; background: #2a1a38; }
  .opt-item.selected { border-color: #e070b0; background: #2e1640; box-shadow: 0 0 0 1px #e070b0; }
  .opt-radio { border-color: #5a3a68; }
  .opt-item.selected .opt-radio { border-color: #e070b0; }
  .opt-item.selected .opt-radio::after { background: #e070b0; }
  .opt-label { color: #b8a0c8; }
  .opt-item.selected .opt-label { color: #e070b0; }
  .btn-outline { background: #241830; color: #b8a0c8; border-color: #3a2848; }
  .btn-outline:hover { border-color: #e070b0; color: #e070b0; background: #2a1a38; }
  .btn-outline:disabled { background: #1e1230; color: #5a3a68; border-color: #2a1a40; }
  .progress-dot { background: #3a2848; }
  .progress-dot.done { background: #a060c0; }
  .progress-dot.current { background: #e070b0; }
  .progress-counter { color: #9070a8; }
  .intro-feature { background: #2a1a38; }
  .intro-feature .feat-title { color: #e070b0; }
  .guide-table td { border-bottom-color: #3a2848; }
  .guide-table .g-num { color: #e070b0; }
  .arch-tag { background: #3a1850; }
  .arch-subtitle { color: #e0c8e8; }
  .arch-desc { color: #b0a0c0; }
  .arch-desc .quote { color: #5a3a68; }
  .bar-name { color: #d0c0e0; }
  .bar-bar { background: #3a2848; }
  .result-header .en-title { color: #e070b0; }
  .radar-legend { color: #9070a8; }
  .footer .disclaimer { color: #6a5080; }
  .bar-section .bar-title h2 { color: #e070b0; }
}
</style>
</head>

  "共情力":"你像一面情感的镜子，能精准映照他人的内心。人们在你身边感到被真正理解和接纳，这是你最珍贵的能力。",
  "协调力":"你的身体就是最强大的工具。无论是运动场上的爆发力还是手工操作的精准度，你都游刃有余，用行动而不是言语来证明自己。",
  "律动力":"节奏和旋律是你的第二语言。音乐不仅是你的爱好，更是你感知和影响世界的独特方式。你用韵律来表达无需言说的情感。",
  "观察力":"你有一双鹰一般的眼睛。细节逃不过你的注视，模式逃不过你的感知，世界在你眼中更加清晰，你能看到别人看不到的真相。",
  "原创力":"你天生不满足于复制，创造才是你的本能。当你把脑海中的新点子变成现实时，世界因此变得不同。你的灵感像泉水一样涌动。",
  "审美力":"美是你的信仰。你对色彩、形态和氛围的敏感让你能从平凡中提炼出令人惊叹的美感。在别人眼中普通的事物，在你眼里都是灵感。"
};
var archCareers = {
  "表达力":"作家、记者、演说家、教师、律师、内容创作者",
  "分析力":"程序员、数据科学家、金融分析师、工程师、策略顾问",
  "想象力":"设计师、建筑师、导演、游戏策划、插画师、产品经理",
  "自察力":"心理咨询师、作家、人生教练、独立研究者",
  "共情力":"心理咨询师、HR、社工、销售、护士、管理者",
  "协调力":"运动员、外科医生、舞蹈演员、手工艺人、厨师",
  "律动力":"音乐人、作曲家、DJ、音响工程师、配音演员",
  "观察力":"科学家、侦探、摄影师、医生、自然学家",
  "原创力":"创业者、发明家、艺术家、导演、广告创意",
  "审美力":"时尚设计师、室内设计师、摄影师、花艺师、美妆博主"
};

var TOTAL = 40;
var currentIdx = 0;
var answers = {};

function startTest() {
  currentIdx = 0; answers = {};
  document.getElementById("page-intro").style.display = "none";
  document.getElementById("page-result").style.display = "none";
  document.getElementById("page-quiz").style.display = "block";
  buildDots(); renderQ(0);
  window.scrollTo(0,0);
}

function buildDots() {
  var h = '';
  for (var i=0;i<TOTAL;i++) h += '<div id="dot'+i+'" class="progress-dot"></div>';
  document.getElementById("progress-dots").innerHTML = h;
}

function renderQ(idx) {
  currentIdx = idx;
  var q = questions[idx];
  var val = answers[q.id] || 0;
  var h = '<div class="fade-in">';
  h += '<div class="q-number">' + q.id + ' / 40</div>';
  h += '<div class="q-text">' + q.t + '</div>';
  h += '<div class="option-list">';
  var opts = ["非常符合","比较符合","部分符合","不太符合","完全不符合"];
  for (var v=5; v>=1; v--) {
    var sel = (val===v) ? ' selected' : '';
    h += '<div class="opt-item' + sel + '" onclick="selectOpt(' + q.id + ',' + v + ',this)">';
    h += '<div class="opt-radio"></div>';
    h += '<div class="opt-label">' + opts[5-v] + '</div></div>';
  }
  h += '</div></div>';
  document.getElementById("quiz-card").innerHTML = h;

  var answered = Object.keys(answers).length;
  document.getElementById("progress-counter").textContent = (idx+1) + ' / ' + TOTAL + '（已答 ' + answered + ' 题）';
  for (var i=0;i<TOTAL;i++) {
    var dot = document.getElementById("dot"+i);
    if (!dot) continue;
    dot.className = "progress-dot";
    if (i<idx) dot.className += " done";
    if (i===idx) dot.className += " current";
  }
  var btnP = document.getElementById("btn-prev");
  btnP.style.visibility = (idx===0) ? "hidden" : "visible";
  document.getElementById("btn-next").textContent = (idx===TOTAL-1) ? "查看结果" : "下一题";
}

function selectOpt(qid, val, el) {
  answers[qid] = val;
  var items = el.parentNode.querySelectorAll(".opt-item");
  for (var i=0;i<items.length;i++) items[i].className = "opt-item";
  el.className = "opt-item selected";
  setTimeout(function(){ if (currentIdx < TOTAL-1) renderQ(currentIdx+1); }, 250);
}

function nextQ() { if (currentIdx < TOTAL-1) renderQ(currentIdx+1); else submitTest(); }
function prevQ() { if (currentIdx>0) renderQ(currentIdx-1); }

function submitTest() {
  var scores = [];
  for (var i=0;i<TOTAL;i++) scores.push(answers[questions[i].id] || 3);

  var dimScores = {};
  for (var d=0;d<dims.length;d++) {
    var dn = dims[d]; var sum=0, count=0;
    for (var i=0;i<TOTAL;i++) if (questions[i].f===dn) { sum+=scores[i]; count++; }
    dimScores[dn] = {sum:sum, count:count, avg:parseFloat((sum/count).toFixed(2))};
  }

  var sorted = [];
  for (var d=0;d<dims.length;d++) sorted.push({name:dims[d], avg:dimScores[dims[d]].avg});
  sorted.sort(function(a,b){return b.avg-a.avg;});
  var top1=sorted[0].name, top2=sorted[1].name, top3=sorted[2].name;

  var h = '';

  // ===== Section 1: Radar =====
  h += '<div class="radar-section fade-in"><div class="card">';
  h += '<div class="result-header"><div class="en-title">THE TALENT MAP</div>';
  h += '<div class="cn-title">— 天赋分布图谱 —</div></div>';
  h += '<div class="radar-wrap"><canvas id="radar-canvas" width="460" height="460"></canvas></div>';
  h += '<div class="radar-legend"><span><span class="dot top"></span>核心天赋 Top3</span><span><span class="dot normal"></span>其他天赋</span></div>';
  h += '</div></div>';

  // ===== Section 2: Archetype =====
  h += '<div class="arch-card card fade-in">';
  h += '<div style="text-align:center;"><span class="arch-icon">' + archIcons[top1] + '</span></div>';
  h += '<div class="arch-tag">' + archTags[top1] + '</div>';
  h += '<div class="arch-title">' + archTitles[top1] + '</div>';
  h += '<div class="arch-subtitle">' + archSubs[top1] + '</div>';
  h += '<div class="arch-desc">';
  h += '<span class="quote">&ldquo;</span> ' + archDescs[top1] + ' <span class="quote">&rdquo;</span>';
  h += '</div>';
  h += '<div class="arch-desc" style="margin-top:12px;font-size:11px;color:#b090c0;">';
  h += '🧭 适合领域：' + archCareers[top1] + '</div>';
  h += '</div>';

  // ===== Section 3: Bar Chart =====
  h += '<div class="bar-section card fade-in">';
  h += '<div class="bar-title"><h2>DIMENSION ANALYSIS</h2><div class="sub">— 全维度分析 —</div></div>';
  var topSet = {};
  for (var i=0;i<3;i++) topSet[sorted[i].name] = i+1;
  for (var d=0;d<sorted.length;d++) {
    var dn = sorted[d].name;
    var ds = dimScores[dn];
    var pct = Math.round(ds.avg/5*100);
    var rank = topSet[dn];
    h += '<div class="bar-item">';
    h += '<div class="bar-icon">' + dimIcons[dn] + '</div>';
    h += '<div class="bar-info">';
    h += '<div class="bar-name-row"><span class="bar-name">' + dn;
    if (rank) h += '<span class="bar-rank">Top ' + rank + '</span>';
    h += '</span><span class="bar-score">' + ds.avg + ' / 5</span></div>';
    h += '<div class="bar-bar"><div class="bar-fill" style="width:' + pct + '%;"></div></div>';
    h += '</div></div>';
  }
  h += '</div>';

  // Restart
  h += '<div class="footer"><span class="restart" onclick="startTest()">重新测试</span>';
  h += '<p class="disclaimer">基于加德纳多元智能理论 · 结果仅供参考</p></div>';

  document.getElementById("page-quiz").style.display = "none";
  document.getElementById("result-content").innerHTML = h;
  document.getElementById("page-result").style.display = "block";
  window.scrollTo(0,0);
  setTimeout(function(){drawRadar(dimScores, topSet);}, 150);
}

function drawRadar(dimScores, topSet) {
  var canvas = document.getElementById("radar-canvas");
  if (!canvas) return;
  var ctx = canvas.getContext("2d");
  var n = dims.length;
  var cx=230, cy=230, r=190, levels=5;

  var isDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  var gc = isDark ? "#4a3858" : "#e8d8f0";
  var lc = isDark ? "#c0a8d0" : "#555";
  var fc = isDark ? "rgba(216,71,155,0.15)" : "rgba(255,182,193,0.3)";
  var lnc = "#D8479B";
  var dc = isDark ? "#e070b0" : "#D8479B";
  var tdc = "#FFC107";

  ctx.clearRect(0,0,460,460);

  for (var lv=1;lv<=levels;lv++) {
    var lr = r*lv/levels; ctx.beginPath();
    for (var i=0;i<n;i++) {
      var a = Math.PI*2*i/n - Math.PI/2;
      if(i===0)ctx.moveTo(cx+lr*Math.cos(a),cy+lr*Math.sin(a));
      else ctx.lineTo(cx+lr*Math.cos(a),cy+lr*Math.sin(a));
    }
    ctx.closePath(); ctx.strokeStyle=gc; ctx.lineWidth=0.8; ctx.stroke();
  }

  for (var i=0;i<n;i++) {
    var a = Math.PI*2*i/n - Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    ctx.strokeStyle=gc; ctx.lineWidth=0.6; ctx.stroke();
  }

  ctx.fillStyle=lc; ctx.font='11px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign="center"; ctx.textBaseline="middle";
  var ld = r+24;
  for (var i=0;i<n;i++) {
    var a = Math.PI*2*i/n - Math.PI/2;
    ctx.fillText(dims[i], cx+ld*Math.cos(a), cy+ld*Math.sin(a));
  }

  var dvs = [];
  for (var i=0;i<n;i++) dvs.push(dimScores[dims[i]].avg);

  ctx.beginPath();
  for (var i=0;i<n;i++) {
    var dr = r*dvs[i]/5;
    var a = Math.PI*2*i/n - Math.PI/2;
    if(i===0)ctx.moveTo(cx+dr*Math.cos(a),cy+dr*Math.sin(a));
    else ctx.lineTo(cx+dr*Math.cos(a),cy+dr*Math.sin(a));
  }
  ctx.closePath(); ctx.fillStyle=fc; ctx.fill();
  ctx.strokeStyle=lnc; ctx.lineWidth=2; ctx.stroke();

  for (var i=0;i<n;i++) {
    var dr = r*dvs[i]/5;
    var a = Math.PI*2*i/n - Math.PI/2;
    var isTop = topSet[dims[i]];
    ctx.beginPath();
    ctx.arc(cx+dr*Math.cos(a),cy+dr*Math.sin(a), isTop ? 6 : 3.5, 0, Math.PI*2);
    ctx.fillStyle = isTop ? tdc : "#fff";
    ctx.fill();
    ctx.strokeStyle = isTop ? "#e0a800" : "#d0b8e0";
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}
</script>
